<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인천 공동탐구 지도</title>
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=0q0a3jnlqu&submodules=visualization"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, " Malgun Gothic", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: #ffffff;
      border-left: 1px solid #e5e7eb;
      padding: 20px;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .desc {
      margin: 0 0 16px;
      font-size: 14px;
      line-height: 1.5;
      color: #4b5563;
    }

    .card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .card:hover {
      background: #eef2ff;
    }

    .meta {
      font-size: 13px;
      color: #6b7280;
      margin-top: 6px;
      line-height: 1.5;
    }

    .value {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 6px 10px;
      background: #e0f2fe;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 18px;
    }

    button {
      border: none;
      background: #16a34a;
      color: white;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      min-width: 0;
      flex: 1 1 auto;
    }

    button.secondary {
      background: #2563eb;
    }

    .status {
      margin-bottom: 16px;
      font-size: 13px;
      color: #4b5563;
    }

    .small {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.45;
    }

    .empty {
      color: #9ca3af;
      font-size: 14px;
      padding: 10px 0;
    }

    .infobox {
      min-width: 220px;
      max-width: 280px;
      padding: 4px;
      font-size: 13px;
      line-height: 1.55;
    }

    .infobox strong {
      font-size: 15px;
    }

    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
      }

      #map {
        height: 60vh;
      }

      .panel {
        border-left: 0;
        border-top: 1px solid #e5e7eb;
      }

      .toolbar button {
        flex: 1 1 48%;
      }
    }

    @media (max-width: 640px) {
      #map {
        height: 55vh;
      }

      .panel {
        padding: 16px 14px;
      }

      h1 {
        font-size: 20px;
      }

      .desc {
        font-size: 13px;
      }

      .toolbar {
        gap: 6px;
      }

      .toolbar button {
        flex: 1 1 100%;
      }

      .card {
        padding: 12px;
      }

      .value {
        font-size: 13px;
      }
    }

    #list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 6px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div id="map"></div>
    <aside class="panel">
      <h1>인천 공동탐구 지도</h1>
      <p class="desc">
        구글 시트에 입력된 위도·경도·소리데이터를 읽어 네이버 지도에 표시합니다.
      </p>

      <div class="toolbar">
        <button onclick="loadData()">데이터 새로고침</button>
        <button class="secondary" onclick="fitAllMarkers()">전체 보기</button>
      </div>

      <div id="status" class="status">데이터를 불러오는 중...</div>
      <div id="list"></div>
    </aside>
  </div>

  <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/13Gc3kNyYEFZqzdl53J80kdvvkiyQZIIAYJ4cUYMv9Uc/export?format=csv';

    const map = new naver.maps.Map('map', {
      center: new naver.maps.LatLng(37.4563, 126.7052),
      zoom: 11
    });

    naver.maps.Event.addListener(map, 'click', () => {
      infoWindows.forEach(iw => iw.close());
    });

    naver.maps.Event.addListener(map, 'zoom_changed', () => {
      updateOverlayMode();
    });

    let markers = [];
    let infoWindows = [];
    let markerEntries = [];
    let averageCircles = [];
    let valueRange = { min: 0, max: 0 };
    let currentData = [];
    const overlayZoomThreshold = 12;

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getColorByValue(value, min, max) {
      if (Number.isNaN(value)) return '#6b7280';

      if (max === min) {
        return 'rgb(255, 255, 0)';
      }

      const ratio = clamp((value - min) / (max - min), 0, 1);
      const red = Math.round(255 * ratio);
      const green = Math.round(255 * (1 - ratio));
      return `rgb(${red}, ${green}, 0)`;
    }

    function createMarkerIcon(color) {
      return {
        content: `
      <div style="
        width: 22px;
        height: 22px;
        border-radius: 50% 50% 50% 0;
        background: ${color};
        border: 2px solid white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.28);
        transform: rotate(-45deg);
      "></div>
    `,
        anchor: new naver.maps.Point(11, 22)
      };
    }

    function normalizeWeight(value, min, max) {
      if (Number.isNaN(value)) return 0.1;
      if (max === min) return 1;

      const ratio = (value - min) / (max - min);
      return 0.1 + 0.9 * Math.max(0, Math.min(1, ratio));
    }

    function aggregateNearbyPointsByAverage(data, cellSize = 0.005) {
      const buckets = new Map();

      data.forEach(item => {
        const lat = Number(item['위도']);
        const lng = Number(item['경도']);
        const sound = Number(item['소리데이터']);

        if (Number.isNaN(lat) || Number.isNaN(lng) || Number.isNaN(sound)) return;

        const latKey = Math.round(lat / cellSize);
        const lngKey = Math.round(lng / cellSize);
        const key = `${latKey}_${lngKey}`;

        if (!buckets.has(key)) {
          buckets.set(key, {
            latSum: 0,
            lngSum: 0,
            soundSum: 0,
            count: 0
          });
        }

        const bucket = buckets.get(key);
        bucket.latSum += lat;
        bucket.lngSum += lng;
        bucket.soundSum += sound;
        bucket.count += 1;
      });

      return Array.from(buckets.values()).map(bucket => ({
        lat: bucket.latSum / bucket.count,
        lng: bucket.lngSum / bucket.count,
        avgSound: bucket.soundSum / bucket.count,
        count: bucket.count
      }));
    }

    function createAverageCircleOverlays(data) {
  const aggregated = aggregateNearbyPointsByAverage(data, 0.005);
  averageCircles = [];

  aggregated.forEach(item => {
    const color = getColorByValue(item.avgSound, valueRange.min, valueRange.max);
    const center = new naver.maps.LatLng(item.lat, item.lng);

    averageCircles.push(
      new naver.maps.Circle({
        map: null,
        center,
        radius: 1200,
        strokeWeight: 0,
        fillColor: color,
        fillOpacity: 0.04
      }),
      new naver.maps.Circle({
        map: null,
        center,
        radius: 900,
        strokeWeight: 0,
        fillColor: color,
        fillOpacity: 0.08
      }),
      new naver.maps.Circle({
        map: null,
        center,
        radius: 600,
        strokeWeight: 0,
        fillColor: color,
        fillOpacity: 0.15
      }),
      new naver.maps.Circle({
        map: null,
        center,
        radius: 350,
        strokeWeight: 0,
        fillColor: color,
        fillOpacity: 0.25
      })
    );
  });
}

    function aggregateNearbyPointsByAverage(data, cellSize = 0.01) {
      const buckets = new Map();

      data.forEach(item => {
        const lat = Number(item['위도']);
        const lng = Number(item['경도']);
        const sound = Number(item['소리데이터']);

        if (Number.isNaN(lat) || Number.isNaN(lng) || Number.isNaN(sound)) return;

        const latKey = Math.round(lat / cellSize);
        const lngKey = Math.round(lng / cellSize);
        const key = `${latKey}_${lngKey}`;

        if (!buckets.has(key)) {
          buckets.set(key, {
            latSum: 0,
            lngSum: 0,
            soundSum: 0,
            count: 0
          });
        }

        const bucket = buckets.get(key);
        bucket.latSum += lat;
        bucket.lngSum += lng;
        bucket.soundSum += sound;
        bucket.count += 1;
      });

      return Array.from(buckets.values()).map(bucket => ({
        lat: bucket.latSum / bucket.count,
        lng: bucket.lngSum / bucket.count,
        avgSound: bucket.soundSum / bucket.count,
        count: bucket.count
      }));
    }

    function updateOverlayMode() {
      infoWindows.forEach(iw => iw.close());

      const zoom = map.getZoom();
      const showMarkers = zoom >= overlayZoomThreshold;

      markers.forEach(marker => marker.setMap(showMarkers ? map : null));
      averageCircles.forEach(circle => circle.setMap(showMarkers ? null : map));
    }

    function parseCSV(csvText) {
      const rows = [];
      let row = [];
      let value = '';
      let inQuotes = false;

      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        const next = csvText[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            value += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(value);
          value = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(value);
          if (row.some(cell => String(cell).trim() !== '')) rows.push(row);
          row = [];
          value = '';
        } else {
          value += char;
        }
      }

      if (value.length > 0 || row.length > 0) {
        row.push(value);
        if (row.some(cell => String(cell).trim() !== '')) rows.push(row);
      }

      if (rows.length === 0) return [];
      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).map(cols => {
        const obj = {};
        headers.forEach((header, idx) => {
          obj[header] = (cols[idx] ?? '').trim();
        });
        return obj;
      });
    }

    function clearMap() {
      markers.forEach(marker => marker.setMap(null));
      markers = [];

      infoWindows.forEach(iw => iw.close());
      infoWindows = [];

      markerEntries = [];

      averageCircles.forEach(circle => circle.setMap(null));
      averageCircles = [];
    }

    function createInfoHtml(item) {
      return `
    <div class="infobox">
      <strong>${escapeHtml(item['학교명'] || '학교명 없음')}</strong><br>
      소리데이터: ${escapeHtml(item['소리데이터'])}<br>
      측정자: ${escapeHtml(item['측정자 이름'])}
    </div>
  `;
    }

    function renderList(data) {
      const list = document.getElementById('list');

      if (!data.length) {
        list.innerHTML = '<div class="empty">표시할 데이터가 없습니다.</div>';
        return;
      }

      list.innerHTML = data.map((item, index) => {
        const color = getColorByValue(
          Number(item['소리데이터']),
          valueRange.min,
          valueRange.max
        );

        return `
      <div class="card" data-index="${index}" style="cursor:pointer;">
        <strong>${escapeHtml(item['학교명'] || '학교명 없음')}</strong>
        <div class="meta">측정자: ${escapeHtml(item['측정자 이름'])}</div>
        <div class="value" style="background:${color}22; color:#111827; border:1px solid ${color}55;">
          <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${color};margin-right:6px;vertical-align:middle;"></span>
          소리데이터: ${escapeHtml(item['소리데이터'])}
        </div>
      </div>
    `;
      }).join('');

      const cards = list.querySelectorAll('.card');

      cards.forEach(card => {
        const index = Number(card.dataset.index);
        const entry = markerEntries[index];
        if (!entry) return;

        // PC: 카드에 마우스 올리면 지도 점의 정보창 표시
        card.addEventListener('mouseenter', () => {
          infoWindows.forEach(iw => iw.close());
          entry.infoWindow.open(map, entry.marker);
        });

        // PC: 마우스 치우면 닫기
        card.addEventListener('mouseleave', () => {
          entry.infoWindow.close();
        });

        // 모바일: 카드 터치하면 열기 + 해당 위치로 이동
        card.addEventListener('click', () => {
          infoWindows.forEach(iw => iw.close());
          entry.infoWindow.open(map, entry.marker);
          map.panTo(entry.marker.getPosition());
        });
      });
    }
    function fitAllMarkers() {
      if (!markers.length) return;
      const bounds = new naver.maps.LatLngBounds();
      markers.forEach(marker => bounds.extend(marker.getPosition()));
      map.fitBounds(bounds, { top: 40, right: 40, bottom: 40, left: 40 });
    }

    async function loadData() {
      const status = document.getElementById('status');
      status.textContent = '데이터를 불러오는 중...';

      try {
        const response = await fetch(csvUrl + (csvUrl.includes('?') ? '&' : '?') + 't=' + Date.now());
        if (!response.ok) throw new Error('CSV 불러오기 실패: ' + response.status);

        const csvText = await response.text();
        const rawData = parseCSV(csvText);

        const validData = rawData.filter(item => {
          const lat = Number(item['위도']);
          const lng = Number(item['경도']);
          const sound = Number(item['소리데이터']);
          return !Number.isNaN(lat) && !Number.isNaN(lng) && !Number.isNaN(sound);
        });

        const soundValues = validData.map(item => Number(item['소리데이터']));
        valueRange = {
          min: soundValues.length ? Math.min(...soundValues) : 0,
          max: soundValues.length ? Math.max(...soundValues) : 0
        };

        currentData = validData;


        clearMap();

        validData.forEach(item => {
          const lat = Number(item['위도']);
          const lng = Number(item['경도']);
          const position = new naver.maps.LatLng(lat, lng);

          const sound = Number(item['소리데이터']);
          const color = getColorByValue(sound, valueRange.min, valueRange.max);

          const marker = new naver.maps.Marker({
            position,
            map,
            title: item['학교명'] || '측정 지점',
            icon: createMarkerIcon(color)
          });

          const infoWindow = new naver.maps.InfoWindow({
            content: createInfoHtml(item),
            borderWidth: 1,
            backgroundColor: '#fff',
            anchorSize: new naver.maps.Size(12, 14)
          });

          // PC hover 동작
          naver.maps.Event.addListener(marker, 'mouseover', () => {
            infoWindows.forEach(iw => iw.close());
            infoWindow.open(map, marker);
          });

          naver.maps.Event.addListener(marker, 'mouseout', () => {
            infoWindow.close();
          });

          // 모바일 터치 동작
          naver.maps.Event.addListener(marker, 'click', () => {
            infoWindows.forEach(iw => iw.close());
            infoWindow.open(map, marker);
          });

          markers.push(marker);
          infoWindows.push(infoWindow);
          markerEntries.push({ item, marker, infoWindow });
        });

        const aggregatedHeatmapData = aggregateNearbyPointsByAverage(validData, 0.005);

        renderList(validData);
        createAverageCircleOverlays(validData);
        
        if (validData.length) fitAllMarkers();
        updateOverlayMode();

        status.textContent = `총 ${validData.length}개의 측정 지점을 표시했습니다. 마지막 수동 새로고침: ${new Date().toLocaleString('ko-KR')}`;
      } catch (error) {
        console.error(error);
        status.textContent = '오류: ' + error.message;
        document.getElementById('list').innerHTML = '<div class="empty">데이터를 읽지 못했습니다.</div>';
      }
    }

    loadData();
  </script>
</body>

</html>
